<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandya Rani - Iframe Project</title>
    <style>
        body {
            font-family: serif;
            margin: 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }
        /* Styling the iframe container to look like the image box */
        iframe {
            width: 300px;
            height: 150px;
            border: 1px solid #767676;
            display: block;
            margin-bottom: 10px;
        }
        /* Arranging the layout structure */
        .container {
            display: inline-block;
            vertical-align: top;
        }
        .links-list {
            margin-top: 5px;
        }
        .links-list a {
            display: block;
            color: #0000ee;
            text-decoration: underline;
            margin-bottom: 3px;
        }
        .side-link {
            display: inline-block;
            vertical-align: bottom;
            margin-left: 5px;
            color: #0000ee;
            text-decoration: underline;
            padding-bottom: 12px;
        }
    </style>
</head>
<body>

    <h1>Sandya Rani</h1>

    <div class="container">
        <iframe name="display-frame" src=""></iframe>

        <div class="links-list">
            <a href="https://www.srecnandyal.ac.in" target="display-frame">SREC</a>
            <a href="https://www.wikipedia.org" target="display-frame">wikipedia</a>
            <a href="https://www.flipkart.com" target="display-frame">Flipkart</a>
        </div>
    </div>
    
    <a class="side-link" href="#" target="display-frame">simple</a>

</body>
</html>
